<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asset Manager — บริหารสินทรัพย์ส่วนตัว</title>
<style>
/* ============================================================= DESIGN TOKENS */
:root{
  --bg:#f4f6fb; --surface:#ffffff; --surface-2:#f0f3fa; --border:#e2e8f0;
  --text:#1a2333; --muted:#64748b; --faint:#94a3b8;
  --brand:#2563eb; --brand-ink:#1d4ed8; --brand-soft:#dbeafe;
  --green:#16a34a; --green-soft:#dcfce7; --amber:#d97706; --amber-soft:#fef3c7;
  --red:#dc2626; --red-soft:#fee2e2; --purple:#7c3aed;
  --c-compounder:#7c3aed; --c-dividend:#2563eb; --c-highyield:#0891b2;
  --c-defensive:#16a34a; --c-cash:#94a3b8;
  --c-invest:#2563eb; --c-realestate:#d97706; --c-insurance:#0891b2;
  --radius:14px; --radius-sm:9px; --shadow:0 1px 3px rgba(15,23,42,.07),0 8px 24px rgba(15,23,42,.05);
  --space:16px; --maxw:1080px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai","Sarabun","Kanit",Roboto,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0c111d; --surface:#151c2c; --surface-2:#1c2538; --border:#293349;
    --text:#e8edf6; --muted:#94a3b8; --faint:#64748b;
    --brand:#3b82f6; --brand-ink:#60a5fa; --brand-soft:#1e293b;
    --green-soft:#0c2a1a; --amber-soft:#2c2410; --red-soft:#2c1515;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
  }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;
  font-size:15px;-webkit-text-size-adjust:100%;}
h1,h2,h3,h4{margin:0;font-weight:700;line-height:1.25}
button{font-family:inherit;cursor:pointer}
a{color:var(--brand-ink)}
small{color:var(--muted)}

/* ============================================================= LAYOUT */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--space)}
header.topbar{position:sticky;top:0;z-index:30;background:var(--surface);
  border-bottom:1px solid var(--border);box-shadow:0 1px 2px rgba(15,23,42,.04)}
.topbar-inner{display:flex;align-items:center;gap:12px;padding:10px var(--space);
  max-width:var(--maxw);margin:0 auto;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-right:auto}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--purple));
  display:grid;place-items:center;color:#fff;font-size:16px}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--border);background:var(--surface);color:var(--text);
  padding:8px 13px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;min-height:40px;transition:.12s}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.primary:hover{background:var(--brand-ink)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.sm{padding:5px 10px;min-height:32px;font-size:12.5px}
.btn.danger{color:var(--red);border-color:var(--red-soft)}
.btn.block{width:100%;justify-content:center}

/* tabs */
nav.tabs{display:flex;gap:4px;max-width:var(--maxw);margin:0 auto;padding:0 var(--space);
  overflow-x:auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:none;background:transparent;color:var(--muted);
  padding:13px 16px;font-size:14.5px;font-weight:600;border-bottom:2.5px solid transparent;
  white-space:nowrap;min-height:48px;display:flex;align-items:center;gap:7px}
.tab[aria-selected="true"]{color:var(--brand-ink);border-bottom-color:var(--brand)}
.tab .ic{font-size:16px}

main{padding:22px 0 90px}
.view{display:grid;gap:18px}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px}
.card h2{font-size:16px;margin-bottom:3px}
.card h2 .sub{font-weight:500;color:var(--muted);font-size:13px}
.card .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.grid{display:grid;gap:14px}
.grid.cols-2{grid-template-columns:1fr 1fr}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}

/* stat */
.stat{background:var(--surface-2);border-radius:var(--radius-sm);padding:14px}
.stat .label{font-size:12.5px;color:var(--muted);margin-bottom:4px}
.stat .value{font-size:21px;font-weight:800;letter-spacing:-.3px}
.stat .value.sm{font-size:17px}
.stat .hint{font-size:11.5px;color:var(--faint);margin-top:3px}
.hero{background:linear-gradient(135deg,var(--brand),var(--purple));color:#fff;border:none}
.hero .label{color:rgba(255,255,255,.85)}
.hero .value{font-size:30px}
.hero .hint{color:rgba(255,255,255,.8)}

/* progress */
.progress{height:12px;background:var(--surface-2);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--green));border-radius:99px;transition:width .4s}

/* chips / banners */
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;
  padding:5px 10px;border-radius:99px;background:var(--surface-2);color:var(--muted)}
.chip.good{background:var(--green-soft);color:var(--green)}
.chip.warn{background:var(--amber-soft);color:var(--amber)}
.chip.bad{background:var(--red-soft);color:var(--red)}
.banner{display:flex;gap:11px;padding:13px 15px;border-radius:var(--radius-sm);font-size:13.5px;align-items:flex-start}
.banner .bi{font-size:18px;line-height:1.2}
.banner.warn{background:var(--amber-soft);color:var(--amber)}
.banner.bad{background:var(--red-soft);color:var(--red)}
.banner.info{background:var(--brand-soft);color:var(--brand-ink)}
.banner.good{background:var(--green-soft);color:var(--green)}
.banner b{font-weight:700}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;
  padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl td.num,.tbl th.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl .row-actions{display:flex;gap:5px;justify-content:flex-end}
.type-dot{display:inline-block;width:9px;height:9px;border-radius:99px;margin-right:6px;vertical-align:middle}

/* forms */
.field{display:grid;gap:5px;margin-bottom:13px}
.field label{font-size:12.5px;font-weight:600;color:var(--muted)}
.field .req{color:var(--red)}
input,select,textarea{font-family:inherit;font-size:14.5px;padding:10px 12px;border:1px solid var(--border);
  border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:100%;min-height:42px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}
textarea{min-height:80px;resize:vertical}
.field .hint{font-size:11.5px;color:var(--faint)}
.field.row-check{display:flex;align-items:center;gap:9px}
.field.row-check input{width:auto;min-height:auto;width:18px;height:18px}
.field.row-check label{margin:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.form-grid .full{grid-column:1/-1}

/* goal form */
.goalform{display:grid;grid-template-columns:repeat(3,1fr);gap:0 14px}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.seg button{border:none;background:var(--surface);padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button[aria-pressed="true"]{background:var(--brand);color:#fff}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(2px);
  z-index:50;display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:560px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:16px}
.modal-body{padding:18px}
.modal-foot{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end}
.x{border:none;background:transparent;font-size:22px;color:var(--muted);line-height:1;padding:4px 8px}

/* misc */
.muted{color:var(--muted)}
.empty{text-align:center;padding:30px 16px;color:var(--muted)}
.empty .big{font-size:34px;margin-bottom:6px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.allocbar{display:grid;grid-template-columns:120px 1fr 84px;gap:10px;align-items:center;margin-bottom:9px;font-size:13px}
.allocbar .track{height:18px;background:var(--surface-2);border-radius:6px;position:relative;overflow:hidden}
.allocbar .cur{height:100%;border-radius:6px}
.allocbar .tgt{position:absolute;top:-3px;bottom:-3px;width:2.5px;background:var(--text);opacity:.55}
.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:12.5px;color:var(--muted);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.divider{height:1px;background:var(--border);margin:4px 0}
.kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;font-size:13.5px;border-bottom:1px dashed var(--border)}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted)}
.kv .v{font-weight:700;font-variant-numeric:tabular-nums}
.promptbox{width:100%;min-height:150px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
.help{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;line-height:1;cursor:pointer;padding:0;vertical-align:middle;margin-left:4px}
.help:hover{color:var(--brand);border-color:var(--brand)}
footer.foot{text-align:center;color:var(--faint);font-size:12px;padding:24px var(--space) 40px;line-height:1.6}
.disc{font-size:11.5px;color:var(--faint);margin-top:10px;font-style:italic}

/* self test */
#selftest-view{padding:24px 0}
.test-pass{color:var(--green)} .test-fail{color:var(--red);font-weight:700}

/* responsive */
@media (max-width:760px){
  .grid.cols-3,.grid.cols-4{grid-template-columns:1fr 1fr}
  .goalform{grid-template-columns:1fr 1fr}
}
@media (max-width:560px){
  body{font-size:14.5px}
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .goalform{grid-template-columns:1fr}
  .allocbar{grid-template-columns:88px 1fr 64px;gap:7px;font-size:12px}
  .hero .value{font-size:25px}
  /* tables collapse to cards */
  .tbl.responsive thead{display:none}
  .tbl.responsive,.tbl.responsive tbody,.tbl.responsive tr,.tbl.responsive td{display:block;width:100%}
  .tbl.responsive tr{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;padding:6px 10px}
  .tbl.responsive td{border:none;padding:6px 0;display:flex;justify-content:space-between;gap:12px;text-align:right}
  .tbl.responsive td::before{content:attr(data-label);color:var(--muted);font-size:12px;font-weight:600;text-align:left}
  .tbl.responsive td.num{text-align:right}
  .tbl.responsive td.row-actions-cell{justify-content:flex-end}
  .tbl.responsive td.row-actions-cell::before{content:""}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="logo">฿</span><span>Asset Manager</span></div>
    <div class="topbar-actions">
      <button class="btn sm" id="btn-export">⬇️ Export</button>
      <button class="btn sm" id="btn-import">⬆️ Import</button>
      <input type="file" id="file-import" accept="application/json,.json" hidden />
    </div>
  </div>
  <nav class="tabs" id="tabs" role="tablist"></nav>
</header>

<main><div class="wrap"><div id="view" class="view"></div></div></main>

<footer class="foot">
  <div>Asset Manager · v1.0 · ข้อมูลเก็บในเครื่องนี้เท่านั้น (localStorage)</div>
  <div class="disc">ไม่ใช่คำแนะนำการลงทุน — เป็นเครื่องมือช่วยคิดอย่างมีระบบ ตัวเลขเป็นค่าประมาณ ปรับตามความเสี่ยงที่รับได้จริง</div>
  <div style="margin-top:6px"><a href="?selftest">รัน self-test</a></div>
</footer>

<!-- generic modal -->
<div class="overlay" id="overlay"><div class="modal" id="modal">
  <div class="modal-head"><h3 id="modal-title"></h3><button class="x" id="modal-x">×</button></div>
  <div class="modal-body" id="modal-body"></div>
  <div class="modal-foot" id="modal-foot"></div>
</div></div>

<script>
"use strict";
/* ===================================================================================
   ASSET MANAGER — single-file app. Sections:
   0 CONSTANTS · 1 STATE · 2 CORE MATH (pure) · 3 PROMPTS · 4 RENDER · 5 EVENTS · 6 SELF-TESTS · BOOT
   Data lives in localStorage (1 versioned JSON). STATE is the single source of truth.
   No external network requests. Charts = inline SVG. ไม่ใช่คำแนะนำการลงทุน.
=================================================================================== */

/* ===================================================== SECTION 0 — CONSTANTS */
const SCHEMA_VERSION = 4;   // v4: holdings gain ai_summary (AI business summary) + understood (owner's competence gate)
const STORAGE_KEY = "assetManager.state";
const BACKUP_KEY  = "assetManager.state.bak";

const TABS = [
  {id:"dashboard",  label:"สรุป",            ic:"📊"},
  {id:"investing",  label:"การลงทุน",        ic:"📈"},
  {id:"realestate", label:"อสังหาริมทรัพย์", ic:"🏠"},
  {id:"insurance",  label:"ประกัน",          ic:"🛡️"},
];

const ENUMS = {
  asset_class:      ["stock","reit","bond","fund","other"],
  stock_type:       ["dividend_grower","compounder","high_yield","defensive","none"],
  valuation_verdict:["unknown","cheap","fair","expensive"],
  nestegg_method:   ["four_percent","dividend_only"],
  market:           ["TH","US","other"],
  property_type:    ["house","condo","land","commercial","townhouse"],
  policy_type:      ["life","health","endowment","annuity","unit_linked"],
};
const LABELS = {
  asset_class:{stock:"หุ้น",reit:"REIT/กองทุนอสังหา",bond:"ตราสารหนี้",fund:"กองทุนรวม",other:"อื่นๆ"},
  stock_type:{dividend_grower:"Dividend Grower (ปันผลโต)",compounder:"Compounder/Growth (โต)",
    high_yield:"High-Yield (REIT/utility)",defensive:"Defensive (ตั้งรับ)",none:"ไม่ระบุ/เงินสด"},
  valuation_verdict:{unknown:"ยังไม่ประเมิน",cheap:"ถูก",fair:"เหมาะสม",expensive:"แพง"},
  nestegg_method:{four_percent:"กฎ 4% (×25)",dividend_only:"อยู่ด้วยปันผล"},
  market:{TH:"ไทย",US:"สหรัฐฯ",other:"อื่นๆ"},
  property_type:{house:"บ้านเดี่ยว",condo:"คอนโด",land:"ที่ดิน",commercial:"อาคารพาณิชย์",townhouse:"ทาวน์เฮาส์"},
  policy_type:{life:"ประกันชีวิต",health:"ประกันสุขภาพ",endowment:"สะสมทรัพย์",annuity:"บำนาญ",unit_linked:"ยูนิตลิงค์"},
};
// 4 investment buckets used by the framework (+ cash buffer)
const BUCKETS = ["compounder","dividend_grower","high_yield","defensive","cash"];
const BUCKET_LABEL = {compounder:"Compounder/Growth",dividend_grower:"Dividend Grower",
  high_yield:"High-Yield",defensive:"Defensive",cash:"เงินสด/พักเงิน"};
const BUCKET_COLOR = {compounder:"var(--c-compounder)",dividend_grower:"var(--c-dividend)",
  high_yield:"var(--c-highyield)",defensive:"var(--c-defensive)",cash:"var(--c-cash)"};

// Target allocation bands by required annual return (%). Order matters.
const TARGET_ALLOCATION = [
  {max:5,  name:"อนุรักษ์-เน้น income", a:{compounder:15,dividend_grower:30,high_yield:25,defensive:25,cash:5}},
  {max:8,  name:"สมดุล",                a:{compounder:30,dividend_grower:30,high_yield:15,defensive:15,cash:10}},
  {max:12, name:"เอียง growth",         a:{compounder:50,dividend_grower:25,high_yield:10,defensive:10,cash:5}},
];
const BRAKE_MSG = "ผลตอบแทนที่ต้องการสูงเกินไป — อย่าไล่ผลตอบแทนด้วยการเพิ่มความเสี่ยง ให้ปรับ input แทน: ออมเพิ่ม / ยืดเวลา / ลดเป้ารายได้";

// Scoring framework text embedded into AI-prompt #2 (from wiki/stock-scoring-sheet.md)
const SCORING_FRAMEWORK = `กรอบให้คะแนนหุ้น (ใช้เป็นเกณฑ์คัดกรอง):

[ด่านกลาง — ทุกหุ้นต้องผ่าน ไม่ผ่านแม้ข้อเดียว = ตัดทิ้ง]
- เข้าใจธุรกิจ อธิบายได้ว่าหาเงินยังไง (circle of competence)
- Interest coverage > 5 เท่า (จ่ายดอกเบี้ยสบาย)
- ไม่มี red flag งบ (ไม่เพิ่มทุนรัวๆ / กระแสเงินสดดำเนินงานไม่ติดลบเรื้อรัง / ผู้สอบบัญชีไม่ตั้งข้อสังเกต)

[เกณฑ์เฉพาะตามประเภท — Gate + ให้คะแนน 6 ข้อ ข้อละ 0–2 เต็ม 12]
A. Dividend Grower — Gate: ปันผลจาก FCF จริง, payout<80%, ไม่เคยลด/งดปันผล ~10 ปี.
   คะแนน: payout(<50=2,50-70=1,>70=0); ปีที่เพิ่มปันผลต่อเนื่อง(10+=2,5-9=1); ปันผลโตชนะเงินเฟ้อ; กำไร/FCF นิ่ง; D/E<1; ROE>12-15% สม่ำเสมอ
B. Compounder/Growth — Gate: ROIC/ROE>15% ไม่ได้มาจากหนี้, รายได้โตจริง 5 ปี, กระแสเงินสดดำเนินงานบวก.
   คะแนน: ROIC/ROE สูง-นิ่ง; reinvestment runway ยาว; margin ขยาย; รายได้โตสม่ำเสมอ; งบสะอาดหนี้ต่ำ; PEG<1.5
C. High-Yield (REIT/utility) — Gate: interest coverage แข็ง, payout จาก AFFO/FFO ยั่งยืน, D/E ไม่เกินกลุ่ม.
   คะแนน: AFFO/FFO payout ไม่ตึง; คุณภาพรายได้(occupancy/สัญญายาว/regulated); โครงสร้างหนี้ดี; ประวัติ distribution สม่ำเสมอ; distribution โต; yield เทียบอดีตตัวเองสมเหตุผล
D. Defensive/Staple — Gate: ผ่านวิกฤต 2008/2020, หนี้ต่ำ, สินค้าจำเป็นใช้ซ้ำ.
   คะแนน: กำไรนิ่ง; margin คงที่; moat/แบรนด์; ROE สม่ำเสมอ; D/E ต่ำ; ปันผล+yield พอใช้

[แปลผลคะแนน] 10-12 = คุณภาพสูง · 7-9 = กลาง · ≤6 = ต่ำ
[เช็คราคา] P/E เทียบค่าเฉลี่ย 5-10 ปีตัวเอง + เทียบคู่แข่ง; yield เทียบอดีตตัวเอง; margin of safety ~20-30% ใต้มูลค่าประเมิน
[ตัดสินใจ] คุณภาพสูง+ราคาถูก/เหมาะ=ซื้อ · คุณภาพสูง+แพง=watchlist · คุณภาพกลาง+ถูก=พิจารณา/ลดไซส์ · นอกนั้น=ผ่าน`;

const DISCLAIMER_TH = "หมายเหตุ: ข้อมูลข้างต้นเพื่อช่วยวิเคราะห์เท่านั้น ไม่ใช่คำแนะนำการลงทุน โปรดตัดสินใจด้วยตนเอง";

/* ===================================================== SECTION 1 — STATE */
let STATE = null;
let ACTIVE_TAB = "dashboard";
let _saveTimer = null;

function uid(p){ return p + "_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function nowISO(){ return new Date().toISOString(); }
function currentMonth(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }

function defaultState(){
  return {
    schemaVersion: SCHEMA_VERSION,
    meta:{ appName:"Asset Manager", createdAt:nowISO(), updatedAt:nowISO(), currency:"THB", onboarded:false },
    settings:{ wht_pct:10, concentration_threshold_pct:40, glide_years:6 },
    goal:{ target_monthly_thb:100000, target_year:2040, starting_capital_thb:0,
           monthly_contribution_thb:0, expected_growth_pct:5, nestegg_method:"four_percent" },
    investing:{ holdings:[] },
    real_estate:{ properties:[] },
    insurance:{ policies:[] },
  };
}

function loadState(){
  let raw;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){ raw=null; }
  if(!raw){ return {state:defaultState(), fresh:true}; }
  try{
    const parsed = JSON.parse(raw);
    const migrated = migrateState(parsed);
    const {ok, value} = validateState(migrated);
    if(!ok) return {state:null, corrupt:true};
    return {state:value, fresh:false};
  }catch(e){ return {state:null, corrupt:true}; }
}

function persist(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }catch(e){}
}
function persistDebounced(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(persist, 150);
}

// commit = atomic swap + persist + re-render active tab
function commit(next){
  next.meta = next.meta || {};
  next.meta.updatedAt = nowISO();
  STATE = next;
  persist();
  render(ACTIVE_TAB);
}

function exportState(){
  const data = JSON.stringify(STATE, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "asset-manager-backup-" + currentMonth() + "-" + new Date().getDate() + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function importStateFromText(rawText){
  let parsed;
  try{ parsed = JSON.parse(rawText); }
  catch(e){ throw new Error("ไฟล์ไม่ใช่ JSON ที่ถูกต้อง"); }
  const migrated = migrateState(parsed);          // version check first (older exports still load)
  const {ok, value, errors} = validateState(migrated);
  if(!ok) throw new Error("ข้อมูลในไฟล์ไม่สมบูรณ์:\n- " + errors.slice(0,8).join("\n- "));
  // stash current (valid) state so a bad-but-valid import can be undone once
  try{ if(STATE) localStorage.setItem(BACKUP_KEY, JSON.stringify(STATE)); }catch(e){}
  commit(value);
}

// migrate older schema versions forward. Reject newer-than-known.
function migrateState(obj){
  if(typeof obj!=="object"||obj===null) throw new Error("รูปแบบไฟล์ไม่ถูกต้อง");
  let v = Number(obj.schemaVersion||0);
  if(v > SCHEMA_VERSION) throw new Error("ไฟล์นี้สร้างจากแอปเวอร์ชันใหม่กว่า กรุณาอัปเดตแอป");
  let s = obj;
  // v1→v2: holdings gain units/price_per_unit/cost_per_unit (nullable). Old lump holdings keep
  // their value_thb/cost_basis_thb and work unchanged — normalized as null fields in validateState.
  if(v<2){ v=2; }
  // v2→v3: holdings gain currency (default THB) + fx_rate (default 1); price_per_unit/cost_per_unit
  // reinterpreted as native-currency amounts. For migrated THB holdings fx=1 → value_thb unchanged.
  // No structural transform — validateState fills currency/fx defaults.
  if(v<3){ v=3; }
  // v3→v4: holdings gain ai_summary (AI business summary) + understood (owner's competence gate).
  // Additive — validateState fills defaults (null / false). No structural transform.
  if(v<4){ v=4; }
  s.schemaVersion = SCHEMA_VERSION;
  return s;
}

// validate-before-commit. Collect ALL errors; never silently default a real value.
function validateState(obj){
  const errors=[];
  const isNum = n => typeof n==="number" && Number.isFinite(n);
  const def = defaultState();

  const out = {
    schemaVersion: SCHEMA_VERSION,
    meta: Object.assign({}, def.meta, (obj.meta||{})),
    settings: Object.assign({}, def.settings, (obj.settings||{})),
    goal: Object.assign({}, def.goal, (obj.goal||{})),
    investing:{ holdings:[] },
    real_estate:{ properties:[] },
    insurance:{ policies:[] },
  };

  // goal — the load-bearing numbers
  const g = out.goal;
  if(!(isNum(g.target_monthly_thb) && g.target_monthly_thb>0))
    errors.push("เป้ารายได้/เดือน ต้องเป็นตัวเลขมากกว่า 0");
  if(!(isNum(g.target_year) && g.target_year>=2000 && g.target_year<=2200))
    errors.push("ปีเป้าหมายไม่ถูกต้อง");
  ["starting_capital_thb","monthly_contribution_thb","expected_growth_pct"].forEach(k=>{
    if(!isNum(g[k])) errors.push("goal."+k+" ต้องเป็นตัวเลข");
  });
  if(ENUMS.nestegg_method.indexOf(g.nestegg_method)<0) g.nestegg_method="four_percent";

  // settings
  const st = out.settings;
  if(!isNum(st.wht_pct)||st.wht_pct<0||st.wht_pct>100) errors.push("settings.wht_pct ต้องอยู่ 0–100");
  if(!isNum(st.glide_years)||st.glide_years<0) st.glide_years=6;
  if(!isNum(st.concentration_threshold_pct)) st.concentration_threshold_pct=40;

  // holdings
  const inH = (obj.investing && Array.isArray(obj.investing.holdings)) ? obj.investing.holdings : [];
  inH.forEach((h,i)=>{
    if(typeof h!=="object"||!h){ errors.push("holding #"+(i+1)+" เสีย"); return; }
    const o={
      id: h.id||uid("h"), name:String(h.name||"").trim(), ticker:h.ticker?String(h.ticker):null,
      asset_class: ENUMS.asset_class.includes(h.asset_class)?h.asset_class:"stock",
      stock_type: ENUMS.stock_type.includes(h.stock_type)?h.stock_type:"none",
      units: (h.units==null||h.units==="")?null:Number(h.units),                       // v2
      currency: (String(h.currency||"THB").trim().toUpperCase().slice(0,6))||"THB",    // v3 native currency code
      fx_rate: (h.fx_rate==null||h.fx_rate==="")?1:Number(h.fx_rate),                  // v3 THB per 1 native unit
      price_per_unit: (h.price_per_unit==null||h.price_per_unit==="")?null:Number(h.price_per_unit),  // v2/v3 native
      cost_per_unit: (h.cost_per_unit==null||h.cost_per_unit==="")?null:Number(h.cost_per_unit),      // v2/v3 native
      value_thb: (h.value_thb==null||h.value_thb==="")?0:Number(h.value_thb),
      yield_pct: Number(h.yield_pct),
      cost_basis_thb: (h.cost_basis_thb==null||h.cost_basis_thb==="")?null:Number(h.cost_basis_thb),
      quality_score: (h.quality_score==null||h.quality_score==="")?null:Number(h.quality_score),
      valuation_verdict: ENUMS.valuation_verdict.includes(h.valuation_verdict)?h.valuation_verdict:"unknown",
      market: ENUMS.market.includes(h.market)?h.market:"TH",
      notes: h.notes?String(h.notes):null, created_at: h.created_at||nowISO(),
      ai_summary: h.ai_summary?String(h.ai_summary).slice(0,2000):null,   // v4 AI business summary (for learning popup)
      understood: !!h.understood,                                         // v4 owner's competence gate (human, not AI)
    };
    if(!o.name) errors.push("holding #"+(i+1)+" ไม่มีชื่อ");
    if(o.units!=null && !(isNum(o.units)&&o.units>=0)) errors.push("holding "+(o.name||i+1)+": จำนวนหน่วยไม่ถูกต้อง");
    if(o.price_per_unit!=null && !(isNum(o.price_per_unit)&&o.price_per_unit>=0)) errors.push("holding "+(o.name||i+1)+": ราคา/หน่วยไม่ถูกต้อง");
    if(o.cost_per_unit!=null && !(isNum(o.cost_per_unit)&&o.cost_per_unit>=0)) errors.push("holding "+(o.name||i+1)+": ต้นทุน/หน่วยไม่ถูกต้อง");
    if(!(isNum(o.fx_rate)&&o.fx_rate>0)) o.fx_rate=1;   // v3 fx must be positive; default to 1 (THB)
    computeHoldingDerived(o);   // value_thb / cost_basis_thb = units × price × fx when present (else keep legacy lump)
    if(!(isNum(o.value_thb)&&o.value_thb>=0)) errors.push("holding "+(o.name||i+1)+": มูลค่าไม่ถูกต้อง");
    if(!(isNum(o.yield_pct)&&o.yield_pct>=0)) errors.push("holding "+(o.name||i+1)+": yield ไม่ถูกต้อง");
    if(o.cost_basis_thb!=null && !(isNum(o.cost_basis_thb)&&o.cost_basis_thb>=0)) errors.push("holding "+o.name+": cost ไม่ถูกต้อง");
    if(o.quality_score!=null && !(isNum(o.quality_score)&&o.quality_score>=0&&o.quality_score<=12)) errors.push("holding "+o.name+": คะแนนต้อง 0–12");
    out.investing.holdings.push(o);
  });

  // properties
  const inP = (obj.real_estate && Array.isArray(obj.real_estate.properties)) ? obj.real_estate.properties : [];
  inP.forEach((p,i)=>{
    if(typeof p!=="object"||!p){ errors.push("property #"+(i+1)+" เสีย"); return; }
    const o={
      id:p.id||uid("re"), name:String(p.name||"").trim(),
      property_type: ENUMS.property_type.includes(p.property_type)?p.property_type:"condo",
      market_value_thb:Number(p.market_value_thb),
      purchase_price_thb:(p.purchase_price_thb==null||p.purchase_price_thb==="")?null:Number(p.purchase_price_thb),
      mortgage_outstanding_thb:Number(p.mortgage_outstanding_thb||0),
      monthly_payment_thb:Number(p.monthly_payment_thb||0),
      rental_income_monthly_thb:Number(p.rental_income_monthly_thb||0),
      rental_expense_monthly_thb:Number(p.rental_expense_monthly_thb||0),
      counts_toward_passive: p.counts_toward_passive!==false,
      notes:p.notes?String(p.notes):null, created_at:p.created_at||nowISO(),
    };
    if(!o.name) errors.push("property #"+(i+1)+" ไม่มีชื่อ");
    ["market_value_thb","mortgage_outstanding_thb","monthly_payment_thb","rental_income_monthly_thb","rental_expense_monthly_thb"].forEach(k=>{
      if(!(isNum(o[k])&&o[k]>=0)) errors.push("property "+(o.name||i+1)+": "+k+" ไม่ถูกต้อง");
    });
    out.real_estate.properties.push(o);
  });

  // policies
  const inI = (obj.insurance && Array.isArray(obj.insurance.policies)) ? obj.insurance.policies : [];
  inI.forEach((p,i)=>{
    if(typeof p!=="object"||!p){ errors.push("policy #"+(i+1)+" เสีย"); return; }
    const o={
      id:p.id||uid("ins"), name:String(p.name||"").trim(),
      policy_type: ENUMS.policy_type.includes(p.policy_type)?p.policy_type:"life",
      insurer:p.insurer?String(p.insurer):null,
      annual_premium_thb:Number(p.annual_premium_thb||0),
      sum_insured_thb:Number(p.sum_insured_thb||0),
      cash_value_thb:Number(p.cash_value_thb||0),
      maturity_date:p.maturity_date?String(p.maturity_date):null,
      beneficiary:p.beneficiary?String(p.beneficiary):null,
      tax_deductible: !!p.tax_deductible,
      counts_toward_networth: p.counts_toward_networth!==false,
      notes:p.notes?String(p.notes):null, created_at:p.created_at||nowISO(),
    };
    if(!o.name) errors.push("policy #"+(i+1)+" ไม่มีชื่อ");
    ["annual_premium_thb","sum_insured_thb","cash_value_thb"].forEach(k=>{
      if(!(isNum(o[k])&&o[k]>=0)) errors.push("policy "+(o.name||i+1)+": "+k+" ไม่ถูกต้อง");
    });
    out.insurance.policies.push(o);
  });

  return { ok: errors.length===0, value: out, errors };
}

/* ===================================================== SECTION 2 — CORE MATH (pure, no DOM) */
function clampPct(p){ if(!Number.isFinite(p)) return 0; return Math.min(100, Math.max(0,p)); }
function nn(n){ return Number.isFinite(n)&&n>0 ? n : 0; }              // non-neg finite, else 0
function n0(n){ return Number.isFinite(n) ? n : 0; }

function addMonths(ym, n){
  const [y,m] = ym.split("-").map(Number);
  const total = y*12 + (m-1) + n;
  const ny = Math.floor(total/12);
  const nm = (total%12+12)%12 + 1;
  return ny + "-" + String(nm).padStart(2,"0");
}
function monthsBetween(a, b){
  const [ay,am]=a.split("-").map(Number), [by,bm]=b.split("-").map(Number);
  return (by-ay)*12 + (bm-am);
}

// ---- per-holding & portfolio ----
// v2: value_thb / cost_basis_thb are DERIVED from units × price when those are present.
// Legacy (v1) holdings have units=null → keep their stored lump value_thb / cost_basis_thb.
// value_thb stays the canonical field every downstream calc reads (blast radius = 0).
function computeHoldingDerived(h){
  // units semantics: null = legacy lump (keep stored value_thb) · >0 = compute from market data
  // · 0 = zero position (no override). Empty form fields save as null (not 0) to preserve the sentinel.
  // v3: price_per_unit & cost_per_unit are in native currency; fx_rate (THB per native unit, default 1)
  // converts to THB. value_thb stays the canonical field every downstream calc reads (blast radius = 0).
  const fx = (h.fx_rate>0) ? h.fx_rate : 1;
  if(h.units>0 && h.price_per_unit>0) h.value_thb = h.units * h.price_per_unit * fx;
  if(!Number.isFinite(h.value_thb)) h.value_thb = 0;
  if(h.units>0 && h.cost_per_unit>0) h.cost_basis_thb = h.units * h.cost_per_unit * fx;
  return h;
}
function holdingGrossAnnual(h){ return nn(h.value_thb) * nn(h.yield_pct) / 100; }
function holdingNetMonthly(h, wht){ return holdingGrossAnnual(h) * (1 - clampPct(wht)/100) / 12; }
function holdingYieldOnCost(h){
  if(h.cost_basis_thb==null || !(h.cost_basis_thb>0)) return null;
  return holdingGrossAnnual(h) / h.cost_basis_thb * 100;
}
function portfolioTotals(holdings, wht){
  let totalValue=0, grossAnnual=0, costSum=0, grossOnCost=0;
  holdings.forEach(h=>{
    totalValue += nn(h.value_thb);
    const ga = holdingGrossAnnual(h);
    grossAnnual += ga;
    if(h.cost_basis_thb!=null && h.cost_basis_thb>0){ costSum += h.cost_basis_thb; grossOnCost += ga; }
  });
  const netAnnual = grossAnnual * (1 - clampPct(wht)/100);
  return {
    count: holdings.length, totalValue, grossAnnualDividend:grossAnnual, netAnnualDividend:netAnnual,
    netMonthlyDividend: netAnnual/12,
    blendedYieldPct: totalValue>0 ? grossAnnual/totalValue*100 : 0,
    netBlendedYieldPct: totalValue>0 ? netAnnual/totalValue*100 : 0,
    yieldOnCostPct: costSum>0 ? grossOnCost/costSum*100 : null,
  };
}
function concentration(holdings, thresholdPct){
  const total = holdings.reduce((s,h)=>s+nn(h.value_thb),0);
  if(total<=0) return {topName:null, topSharePct:0, flagged:false};
  let top=holdings[0];
  holdings.forEach(h=>{ if(nn(h.value_thb)>nn(top.value_thb)) top=h; });
  const share = nn(top.value_thb)/total*100;
  return {topName:top?top.name:null, topSharePct:share, flagged: share>thresholdPct};
}

// ---- nest egg & required capital ----
function requiredCapital(targetMonthly, netBlendedYieldPct){
  if(!(targetMonthly>0) || !(netBlendedYieldPct>0)) return null;
  return targetMonthly*12 / (netBlendedYieldPct/100);
}
function nestEggFourPercent(targetMonthly){ return targetMonthly>0 ? targetMonthly*12*25 : null; }
function nestEggDividendOnly(targetMonthly, netBlendedYieldPct){ return requiredCapital(targetMonthly, netBlendedYieldPct); }
function targetNestEgg(goal, totals){
  if(goal.nestegg_method==="dividend_only")
    return nestEggDividendOnly(goal.target_monthly_thb, totals.netBlendedYieldPct);
  return nestEggFourPercent(goal.target_monthly_thb);
}

// ---- required return (contribution-aware; solved numerically) ----
// FV(P, C monthly, annual rate r, N months). Solve r s.t. FV>=target. Monotonic in r.
function fvWith(P, C, rAnnual, months){
  const i = Math.pow(1+rAnnual, 1/12) - 1;
  if(Math.abs(i) < 1e-9) return P + C*months;
  return P*Math.pow(1+i,months) + C*(Math.pow(1+i,months)-1)/i;
}
// returns decimal annual rate, 0 if already reachable at 0%, Infinity if unreachable <=500%
function requiredReturn(targetCapital, startingCapital, monthlyContribution, months){
  if(!(targetCapital>0) || !(months>0)) return null;
  const P=n0(startingCapital), C=Math.max(0,n0(monthlyContribution));
  if(fvWith(P,C,0,months) >= targetCapital) return 0;
  let lo=0, hi=5;
  if(fvWith(P,C,hi,months) < targetCapital) return Infinity;   // can't reach even at 500%/yr
  for(let k=0;k<120;k++){ const mid=(lo+hi)/2; if(fvWith(P,C,mid,months)>=targetCapital) hi=mid; else lo=mid; }
  return hi;
}
// simple compounding required-CAGR (no contributions) — kept for reference/tests
function requiredCagr(targetCapital, projectedNow, monthsRemaining){
  if(!(targetCapital>0)) return null;
  if(!(projectedNow>0) || monthsRemaining<=0) return null;
  const monthlyRate = Math.pow(targetCapital/projectedNow, 1/monthsRemaining) - 1;
  return Math.pow(1+monthlyRate,12) - 1;
}

// ---- growth projection (monthly compounding; dividends reinvested in accumulation) ----
function projectToTarget(p){
  const targetCapital = p.targetCapital;
  if(!(targetCapital>0)) return {series:[], reachable:false, hitYear:null, monthsToHit:null};
  const monthlyRate = (n0(p.netBlendedYieldPct) + n0(p.expectedGrowthPct))/100/12;
  const contribution = Math.max(0, n0(p.monthlyContribution));
  const startYear = p.startYear;
  const maxYears = p.maxYears || 60;
  let v = Math.max(0, n0(p.currentValue));
  const series=[{year:startYear, value:v}];
  let hitYear=null, monthsToHit=null, months=0;
  for(let y=1; y<=maxYears; y++){
    for(let m=0;m<12;m++){ v = v*(1+monthlyRate) + contribution; months++;
      if(hitYear===null && v>=targetCapital){ hitYear=startYear+y; monthsToHit=months; } }   // months = elapsed months at crossing
    series.push({year:startYear+y, value:v});
    if(hitYear!==null && (startYear+y) >= Math.max(hitYear, p.targetYear||0)) break;
  }
  return {series, reachable:hitYear!==null, hitYear, monthsToHit};
}

// ---- allocation vs framework ----
function bucketOf(h){
  if(h.asset_class==="bond") return "cash";
  if(h.stock_type==="none" || !h.stock_type) return "cash";
  return h.stock_type;   // dividend_grower|compounder|high_yield|defensive
}
function currentAllocation(holdings){
  const sums={compounder:0,dividend_grower:0,high_yield:0,defensive:0,cash:0};
  let total=0;
  holdings.forEach(h=>{ const v=nn(h.value_thb); sums[bucketOf(h)] += v; total += v; });
  const pct={};
  BUCKETS.forEach(b=> pct[b] = total>0 ? sums[b]/total*100 : 0);
  return {sums, total, pct};
}
function targetAllocationFor(requiredReturnPct){
  if(!Number.isFinite(requiredReturnPct)) return {brake:true, name:"เกินเอื้อม", a:null};
  for(const band of TARGET_ALLOCATION){ if(requiredReturnPct<=band.max) return {brake:false, name:band.name, a:band.a, max:band.max}; }
  return {brake:true, name:"เกินกรอบ", a:null};
}
function allocationDrift(currentPct, targetA){
  const drift={};
  BUCKETS.forEach(b=> drift[b] = (currentPct[b]||0) - (targetA?targetA[b]:0));
  return drift;
}
function glidePathStatus(goal, settings, nowYear){
  const yearsLeft = goal.target_year - nowYear;
  const active = yearsLeft>=0 && yearsLeft <= n0(settings.glide_years);
  return { yearsLeft, active,
    message: active ? "ใกล้เป้าหมาย ("+yearsLeft+" ปี) — ค่อยๆ ย้ายน้ำหนักจาก Growth → Dividend + Defensive เพื่อลด sequence-of-returns risk" : null };
}

// ---- whole-portfolio aggregates (state-level) ----
function netWorthBreakdown(state){
  const invest = state.investing.holdings.reduce((s,h)=>s+nn(h.value_thb),0);
  let reEquity=0, mortgage=0, reGross=0;
  state.real_estate.properties.forEach(p=>{ reGross += n0(p.market_value_thb);
    reEquity += n0(p.market_value_thb)-n0(p.mortgage_outstanding_thb); mortgage += n0(p.mortgage_outstanding_thb); });
  let insCash=0;
  state.insurance.policies.forEach(p=>{ if(p.counts_toward_networth) insCash += n0(p.cash_value_thb); });
  // gross assets at market value (incl. underwater props) − debt = net worth. invest+reGross+insCash − mortgage === total.
  return { invest, reEquity, reGross, insCash, mortgage, total: invest+reEquity+insCash };
}
function passiveMonthly(state){
  const div = portfolioTotals(state.investing.holdings, state.settings.wht_pct).netMonthlyDividend;
  let rent=0;
  state.real_estate.properties.forEach(p=>{ if(p.counts_toward_passive) rent += n0(p.rental_income_monthly_thb)-n0(p.rental_expense_monthly_thb); });
  return { dividend:div, rent, total:div+rent };
}

// ---- derived bundle used by render + prompts (single computation point) ----
function deriveInvesting(state, nowMonth){
  const g=state.goal, s=state.settings;
  const totals = portfolioTotals(state.investing.holdings, s.wht_pct);
  const nest = targetNestEgg(g, totals);
  const base = g.starting_capital_thb>0 ? g.starting_capital_thb : totals.totalValue;
  const months = monthsBetween(nowMonth, g.target_year+"-12");
  const rr = (nest!=null) ? requiredReturn(nest, base, g.monthly_contribution_thb, months) : null;
  const rrPct = (rr==null)?null:(rr===Infinity?Infinity:rr*100);
  const target = (rrPct==null)?{brake:false,a:null,name:"—"}:targetAllocationFor(rrPct);
  const curAlloc = currentAllocation(state.investing.holdings);
  const drift = target.a ? allocationDrift(curAlloc.pct, target.a) : null;
  const proj = (nest!=null) ? projectToTarget({
    currentValue:base, netBlendedYieldPct:totals.netBlendedYieldPct, expectedGrowthPct:g.expected_growth_pct,
    monthlyContribution:g.monthly_contribution_thb, targetCapital:nest,
    startYear:Number(nowMonth.split("-")[0]), targetYear:g.target_year }) : {series:[],reachable:false,hitYear:null};
  const glide = glidePathStatus(g, s, Number(nowMonth.split("-")[0]));
  const conc = concentration(state.investing.holdings, s.concentration_threshold_pct);
  // needsInput: no starting capital AND no contribution yet → target is unreachable for a trivial reason,
  // not because the goal is too aggressive. Distinguish so we show a friendly hint, not a BRAKE warning.
  const needsInput = !(base>0) && !(g.monthly_contribution_thb>0);
  return { totals, nest, base, months, rr, rrPct, target, curAlloc, drift, proj, glide, conc, needsInput };
}

// ---- AI price round-trip (pure: parse → preview → apply). No network: AI fetches prices, user pastes back ----
function pickNum(){
  for(let k=0;k<arguments.length;k++){ const a=arguments[k]; if(a==null) continue;
    const n = typeof a==="string" ? Number(a.replace(/[, ]/g,"")) : Number(a);
    if(Number.isFinite(n)) return n; }
  return null;
}
// Parse an AI reply into [{id, priceThb, native, ccy}]. Tolerates ```fences```, surrounding prose,
// array / {prices:[…]} / {id:price} map / single object. Rejects rows without id or with price<=0.
// Shared: pull a JSON array of objects out of an AI reply (tolerates ```fences```, surrounding prose,
// array / {prices|items|holdings:[…]} / {id:value} map / single object). Returns {arr} or {error}.
function extractJsonArray(text){
  if(typeof text!=="string" || !text.trim()) return {arr:null, error:"ยังไม่ได้วางผลลัพธ์จาก AI"};
  let s=text.trim();
  const fence = s.match(/```(?:json)?\s*([\s\S]*?)```/i);   // pull out fenced block if present
  if(fence) s=fence[1].trim();
  const start = s.search(/[\[{]/);
  if(start<0) return {arr:null, error:"ไม่พบ JSON ในข้อความที่วาง"};
  let js = s.slice(start);
  const open = js[0];                                        // trim trailing prose by matching the open bracket
  const end = open==="[" ? js.lastIndexOf("]") : js.lastIndexOf("}");   // limit: trailing prose with brackets (e.g. "[2]") → JSON.parse catch returns a usable error
  if(end>=0) js=js.slice(0,end+1);
  let data;
  try{ data=JSON.parse(js); }catch(e){ return {arr:null, error:"แปลง JSON ไม่สำเร็จ — ตรวจรูปแบบที่ AI ตอบกลับ"}; }
  let arr;
  if(Array.isArray(data)) arr=data;
  else if(data && Array.isArray(data.prices)) arr=data.prices;
  else if(data && Array.isArray(data.items)) arr=data.items;
  else if(data && Array.isArray(data.holdings)) arr=data.holdings;
  // guard widened from original parsePriceResponse to also cover items/holdings wrappers (intentional)
  else if(data && (data.prices!=null || data.items!=null || data.holdings!=null))   // present but not an array → malformed
    return {arr:null, error:"รูปแบบ JSON ไม่ถูกต้อง — ต้องเป็น array"};
  else if(data && typeof data==="object"){
    // Object.keys never yields "__proto__" from JSON.parse output (V8 ES2015+),
    // so the Object.assign below cannot trigger prototype pollution.
    const keys=Object.keys(data);
    const looksLikeMap = keys.length>0 && keys.every(k=> typeof data[k]==="number" || (data[k]&&typeof data[k]==="object" && !Array.isArray(data[k])));
    arr = looksLikeMap
      ? keys.map(k=> typeof data[k]==="number" ? {id:k, price_thb:data[k]} : Object.assign({id:k}, data[k]))
      : [data];   // single object
  }
  if(!Array.isArray(arr)) return {arr:null, error:"รูปแบบ JSON ไม่ใช่รายการ"};
  return {arr, error:null};
}
// Parse a price reply into [{id, priceThb, native, fx, ccy}]. Rejects rows without id or a usable
// price (THB, or native+fx). resolvePrice decides how THB-only vs native+fx is applied.
function parsePriceResponse(text){
  const {arr, error}=extractJsonArray(text);
  if(error) return {prices:[], errors:[error]};
  const errors=[], prices=[];
  arr.forEach((e,i)=>{
    if(!e || typeof e!=="object"){ errors.push("รายการ #"+(i+1)+" ไม่ถูกต้อง"); return; }
    const id = e.id!=null ? String(e.id) : null;
    const priceThb = pickNum(e.price_thb, e.priceThb, e.thb, e.price, e.value);
    const native = pickNum(e.native, e.native_price, e.price_native);
    const fx = pickNum(e.fx, e.fx_rate, e.rate);
    const ccyRaw = e.ccy||e.currency||e.native_currency||null;
    const hasThb = priceThb!=null && priceThb>0;
    const hasNative = native!=null && native>0 && fx!=null && fx>0;   // native price needs fx to convert
    if(id==null){ errors.push("รายการ #"+(i+1)+" ไม่มี id"); return; }
    if(!hasThb && !hasNative){ errors.push("รายการ "+id+": ราคาไม่ถูกต้อง"); return; }
    prices.push({id, priceThb: hasThb?priceThb:null, native: (native!=null&&native>0)?native:null,
      fx: (fx!=null&&fx>0)?fx:null, ccy: ccyRaw?String(ccyRaw).trim().toUpperCase().slice(0,6):null});   // match validateState ccy contract
  });
  return {prices, errors};
}
// Resolve a parsed price entry to {native, fx, ccy} against a holding. Prefer native+fx; else use the
// THB value (keep holding's currency + fx, back out native so value_thb === the THB the AI gave).
function resolvePrice(h, p){
  const hFx = (h && h.fx_rate>0) ? h.fx_rate : 1;
  if(p.native!=null && p.native>0 && p.fx!=null && p.fx>0)
    return {native:p.native, fx:p.fx, ccy:(p.ccy||(h&&h.currency)||"THB")};
  if(p.priceThb!=null && p.priceThb>0)
    return {native:p.priceThb/hFx, fx:hFx, ccy:((h&&h.currency)||"THB")};
  return {native:null, fx:hFx, ccy:((h&&h.currency)||"THB")};
}
// Dry-run: which unit-based holdings would change, by how much, what is unmatched / left untouched.
function previewPriceUpdate(holdings, prices){
  const byId={}; holdings.forEach(h=>byId[h.id]=h);
  const rows=[], unmatched=[], seen={};
  prices.forEach(p=>{
    const h=byId[p.id];
    if(!h || !(h.units>0)){ unmatched.push(p); return; }   // no match, or lump holding (no units to price)
    const r=resolvePrice(h,p);
    if(r.native==null){ unmatched.push(p); return; }
    seen[p.id]=true;
    const newValue = h.units * r.native * r.fx;
    rows.push({id:h.id, name:h.name, ticker:h.ticker||null, units:h.units,
      oldPrice:nn(h.price_per_unit), newPrice:r.native, ccy:r.ccy, fx:r.fx,
      oldValue:nn(h.value_thb), newValue,
      pctChange: h.price_per_unit>0 ? (r.native-h.price_per_unit)/h.price_per_unit*100 : null});
  });
  const notUpdated = holdings.filter(h=>h.units>0 && !seen[h.id]).map(h=>h.name);
  return {rows, unmatched, notUpdated};
}
// Write new prices into a CLONED state (source untouched). Only unit-based holdings; value re-derived.
// Updates price_per_unit (native), fx_rate, and currency together — the AI button refreshes FX too.
function applyPrices(state, prices){
  const ns = JSON.parse(JSON.stringify(state));
  const byId={}; ns.investing.holdings.forEach(h=>byId[h.id]=h);
  let applied=0;
  prices.forEach(p=>{
    const h=byId[p.id];
    if(!h || !(h.units>0)) return;
    const r=resolvePrice(h,p);
    if(r.native==null) return;
    h.price_per_unit = r.native;
    if(r.fx>0) h.fx_rate = r.fx;
    if(r.ccy) h.currency = r.ccy;
    computeHoldingDerived(h);
    applied++;
  });
  return {state:ns, applied};
}

// ---- AI enrich/classify round-trip (pure). User keeps name/units/cost/market; AI fills the analytical fields ----
// Parse an enrich reply into [{id, asset_class?, stock_type?, yield_pct?, quality_score?, valuation_verdict?, ticker?}].
// Each field is included ONLY if valid (enum in range / number in range). Row needs id + ≥1 usable field.
function parseEnrichResponse(text){
  const {arr, error}=extractJsonArray(text);
  if(error) return {items:[], errors:[error]};
  const errors=[], items=[];
  arr.forEach((e,i)=>{
    if(!e || typeof e!=="object"){ errors.push("รายการ #"+(i+1)+" ไม่ถูกต้อง"); return; }
    const id = e.id!=null ? String(e.id) : null;
    if(id==null){ errors.push("รายการ #"+(i+1)+" ไม่มี id"); return; }
    const out={id};
    if(ENUMS.asset_class.includes(e.asset_class)) out.asset_class=e.asset_class;
    if(ENUMS.stock_type.includes(e.stock_type)) out.stock_type=e.stock_type;
    if(ENUMS.valuation_verdict.includes(e.valuation_verdict)) out.valuation_verdict=e.valuation_verdict;
    const y=pickNum(e.yield_pct, e.yield, e.dividend_yield); if(y!=null && y>=0 && y<=100) out.yield_pct=y;   // reject hallucinated yields
    const q=pickNum(e.quality_score, e.quality, e.score); if(q!=null && q>=0 && q<=12) out.quality_score=q;
    if(e.ticker!=null && String(e.ticker).trim()) out.ticker=String(e.ticker).trim().toUpperCase().slice(0,20);
    if(e.summary!=null && String(e.summary).trim()) out.summary=String(e.summary).trim().slice(0,2000);   // business summary for learning popup
    if(Object.keys(out).length<=1){ errors.push("รายการ "+id+": ไม่มีข้อมูลที่ใช้ได้"); return; }
    items.push(out);
  });
  return {items, errors};
}
const ENRICH_FIELDS=[
  {k:"asset_class", label:"ชนิด",  map:()=>LABELS.asset_class},
  {k:"stock_type",  label:"ประเภท",map:()=>LABELS.stock_type},
  {k:"yield_pct",   label:"yield", fmt:v=>fmtPct(v)},
  {k:"quality_score",label:"คะแนน",fmt:v=>v+"/12"},
  {k:"valuation_verdict",label:"ราคา",map:()=>LABELS.valuation_verdict},
  {k:"ticker",      label:"Ticker"},
];
// Dry-run: per holding, which fields AI would change (old→new). ticker is fill-only-if-blank.
function previewEnrich(holdings, items){
  const byId={}; holdings.forEach(h=>byId[h.id]=h);
  const rows=[], unmatched=[], seen={};
  items.forEach(it=>{
    const h=byId[it.id];
    if(!h){ unmatched.push(it); return; }
    const changes=[];
    ENRICH_FIELDS.forEach(f=>{
      if(!(f.k in it)) return;
      if(f.k==="ticker" && h.ticker) return;        // never overwrite an existing ticker
      const oldV=h[f.k], newV=it[f.k];
      if(oldV===newV) return;                        // skip no-ops (already correct)
      const disp = v => v==null||v===""?"—":(f.map?(f.map()[v]||v):(f.fmt?f.fmt(v):v));
      changes.push({field:f.label, old:disp(oldV), neu:disp(newV)});
    });
    if("summary" in it && it.summary && it.summary!==h.ai_summary)   // long text → compact indicator, not a diff dump
      changes.push({field:"สรุป", old:(h.ai_summary?"(เดิม)":"—"), neu:"อัปเดตสรุปธุรกิจ"});
    if(changes.length){ seen[it.id]=true; rows.push({id:h.id, name:h.name, ticker:h.ticker||null, changes}); }
  });
  const noChange = items.filter(it=>byId[it.id] && !seen[it.id]).length;
  return {rows, unmatched, noChange};
}
// Write enrich fields into a CLONED state (source untouched). Never touches name/units/cost/value/price/fx.
function applyEnrich(state, items){
  const ns=JSON.parse(JSON.stringify(state));
  const byId={}; ns.investing.holdings.forEach(h=>byId[h.id]=h);
  let applied=0;
  items.forEach(it=>{
    const h=byId[it.id]; if(!h) return;
    let touched=false;
    ["asset_class","stock_type","valuation_verdict","yield_pct","quality_score"].forEach(k=>{
      if(k in it && h[k]!==it[k]){ h[k]=it[k]; touched=true; }
    });
    if("ticker" in it && !h.ticker){ h.ticker=it.ticker; touched=true; }   // fill only if blank
    if("summary" in it && it.summary && h.ai_summary!==it.summary){ h.ai_summary=it.summary; touched=true; }
    if(touched) applied++;
  });
  return {state:ns, applied};
}

    L.push("- id="+h.id+" · "+h.name+(h.ticker?" ("+h.ticker+")":"")+" · ตลาด:"+LABELS.market[h.market]

      +(h.stock_type&&h.stock_type!=="none"?" · กรอบที่กรอกไว้:"+LABELS.stock_type[h.stock_type]:""));

const $ = sel => document.querySelector(sel);
function fmtTHB(n){ if(n==null||!Number.isFinite(n)) return "—";
  return new Intl.NumberFormat("th-TH",{style:"currency",currency:"THB",maximumFractionDigits:0}).format(n); }
function fmtNum(n,d){ if(n==null||!Number.isFinite(n)) return "—"; return n.toLocaleString("th-TH",{maximumFractionDigits:d==null?0:d}); }
function fmtPct(n,d){ if(n==null||!Number.isFinite(n)) return "—"; return n.toFixed(d==null?1:d)+"%"; }
function fmtDateTH(iso){ try{ return new Date(iso).toLocaleDateString("th-TH",{day:"2-digit",month:"2-digit",year:"numeric"}); }catch(e){ return "—"; } }
function fmtNative(n,ccy){ if(n==null||!Number.isFinite(n)) return "—"; if(!ccy||ccy==="THB") return fmtTHB(n); return fmtNum(n, n%1?2:0)+" "+esc(ccy); }   // esc: ccy is user/AI-sourced, goes to innerHTML
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

// ---------- SVG helpers ----------
function donutSVG(segs, size, stroke){
  const total = segs.reduce((s,x)=>s+x.value,0); if(total<=0) return "";
  const r=(size-stroke)/2, cx=size/2, cy=size/2, C=2*Math.PI*r;
  let off=0;
  const circles = segs.map(s=>{ const len=s.value/total*C;
    const c=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; return c; }).join("");
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${circles}
    <circle cx="${cx}" cy="${cy}" r="${r-stroke/2-1}" fill="var(--surface)"/></svg>`;
}
function projectionSVG(series, target){
  const W=640, H=180, padL=8, padR=8, padT=14, padB=22;
  const ys = series.map(p=>p.value).concat(target?[target]:[]);
  const maxY = Math.max.apply(null, ys.concat([1]))*1.08;
  const x = i => padL + (W-padL-padR) * (i/(series.length-1||1));
  const y = val => padT + (H-padT-padB) * (1 - val/maxY);
  const pts = series.map((p,i)=>x(i)+","+y(p.value)).join(" ");
  const area = `${padL},${y(0)} ${pts} ${x(series.length-1)},${y(0)}`;
  const tgtY = target?y(target):null;
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">
    <polygon points="${area}" fill="var(--brand-soft)" opacity="0.5"/>
    <polyline points="${pts}" fill="none" stroke="var(--brand)" stroke-width="2.5"/>
    ${target?`<line x1="${padL}" y1="${tgtY}" x2="${W-padR}" y2="${tgtY}" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="6 5"/>
      <text x="${W-padR}" y="${Math.max(10,tgtY-4)}" text-anchor="end" font-size="11" fill="var(--green)">เป้า ${fmtTHB(target)}</text>`:""}
    <text x="${padL}" y="${H-6}" font-size="11" fill="var(--muted)">${series[0].year+543}</text>
    <text x="${W-padR}" y="${H-6}" text-anchor="end" font-size="11" fill="var(--muted)">${series[series.length-1].year+543}</text>
  </svg>`;
}

// goal-form inputs are NOT re-rendered while typing (re-creating a focused number input
// resets its caret — the "jumps to front after 1 char" bug). On each keystroke we update
// STATE and refresh ONLY #inv-dynamic; the form inputs stay in the DOM untouched.
function wireGoalFormEvents(){
  const onInput=(obj,key,raw,isSelect)=>{
    if(isSelect){ obj[key]=raw; }
    else { const v = raw===""?0:Number(raw); if(!Number.isFinite(v)) return; obj[key]=v; } // never let NaN into STATE
    persistDebounced();
    refreshInvDynamic();
  };
  document.querySelectorAll("[data-goal]").forEach(inp=>{
    const ev = inp.tagName==="SELECT" ? "change" : "input";
    inp.addEventListener(ev,()=> onInput(STATE.goal, inp.dataset.goal, inp.value, inp.tagName==="SELECT"));
  });
  document.querySelectorAll("[data-setting]").forEach(inp=>{
    inp.addEventListener("input",()=> onInput(STATE.settings, inp.dataset.setting, inp.value, false));
  });
}

function openItemForm(type, existing){
  const sch=FORM_SCHEMAS[type];
  const it = existing || {};
  const body = `<div class="form-grid">${sch.fields.map(f=>{
    const val = it[f.k];
    const full = f.full?` full`:"";
    if(f.t==="checkbox"){
      const checked = existing? (val!==false) : (f.k==="counts_toward_passive"||f.k==="counts_toward_networth");
      return `<div class="field row-check${full}"><input type="checkbox" id="f_${f.k}" ${checked?"checked":""}/><label for="f_${f.k}">${f.l}</label></div>`;
    }
    let input;
    if(f.t==="select"){
      input=`<select id="f_${f.k}">${ENUMS[f.e].map(o=>`<option value="${o}" ${o===val?"selected":""}>${LABELS[f.e][o]}</option>`).join("")}</select>`;
    } else if(f.t==="textarea"){
      input=`<textarea id="f_${f.k}">${esc(val||"")}</textarea>`;
    } else {
      const tp = f.t==="number"?"number":(f.t==="date"?"date":"text");
      const im = f.t==="number"?` inputmode="decimal"`:"";
      input=`<input type="${tp}"${im} id="f_${f.k}" value="${val==null?"":esc(val)}"/>`;
    }
    return `<div class="field${full}"><label>${f.l}${(f.req||f.uiRequired)?` <span class="req">*</span>`:""}</label>${input}${f.hint?`<span class="hint">${f.hint}</span>`:""}</div>`;
  }).join("")}</div>`;

  openModal((existing?"แก้ไข: ":"เพิ่ม: ")+sch.title, body, [
    {label:"ยกเลิก", cls:"btn", on:closeModal},
    {label:"บันทึก", cls:"btn primary", on:()=>saveItemForm(type, existing)},
  ]);
}

function saveItemForm(type, existing){
  const sch=FORM_SCHEMAS[type];
  const obj = existing ? structuredCloneSafe(existing) : {id:uid(sch.idp), created_at:nowISO()};
  for(const f of sch.fields){
    const elx=document.getElementById("f_"+f.k); if(!elx) continue;
    if(f.t==="checkbox") obj[f.k]=elx.checked;
    else if(f.t==="number"){ const raw=elx.value.trim(); obj[f.k]= raw===""? (f.req?0:null) : Number(raw.replace(/,/g,"")); }
    else { const raw=elx.value.trim(); obj[f.k]= raw===""?null:raw; }
  }
  // minimal inline validation
  if(!obj.name || !obj.name.trim()){ alert("กรุณากรอกชื่อ"); return; }
  const numErr = sch.fields.filter(f=>f.t==="number").some(f=> obj[f.k]!=null && (!Number.isFinite(obj[f.k])||obj[f.k]<0));
  if(numErr){ alert("ตัวเลขต้องไม่ติดลบ และเป็นตัวเลขที่ถูกต้อง"); return; }
  if(type==="holding" && obj.quality_score!=null && (obj.quality_score<0||obj.quality_score>12)){ alert("คะแนนคุณภาพต้องอยู่ 0–12"); return; }
  if(type==="holding" && obj.currency && String(obj.currency).trim().toUpperCase()!=="THB" && !(obj.fx_rate>0)){ alert("สินทรัพย์สกุลต่างประเทศ ต้องใส่อัตราแลกเปลี่ยน (บาท/หน่วยสกุล)"); return; }
  if(type==="holding") computeHoldingDerived(obj);   // value_thb / cost_basis_thb = units × price × fx

  const ns = structuredCloneSafe(STATE);
  const [a,b]=sch.coll.split(".");
  const arr = ns[a][b];
  if(existing){ const idx=arr.findIndex(x=>x.id===existing.id); arr[idx]=obj; } else arr.push(obj);
  closeModal();
  commit(ns);
}

function deleteItem(type, id){
  const sch=FORM_SCHEMAS[type];
  const [a,b]=sch.coll.split(".");
  const item = findById(STATE[a][b], id);
  if(!confirm("ลบ \""+(item?item.name:"รายการนี้")+"\" ?")) return;
  const ns=structuredCloneSafe(STATE);
  ns[a][b]=ns[a][b].filter(x=>x.id!==id);
  commit(ns);
}

// ---- modal + prompt + toast ----
function openModal(title, bodyHTML, buttons){
  $("#modal-title").textContent=title;
  $("#modal-body").innerHTML=bodyHTML;
  $("#modal-foot").innerHTML="";
  (buttons||[]).forEach(b=>{ const el=document.createElement("button"); el.className=b.cls; el.textContent=b.label; el.onclick=b.on; $("#modal-foot").appendChild(el); });
  $("#overlay").classList.add("open");
}
function closeModal(){ $("#overlay").classList.remove("open"); }
function showPrompt(title, text){
  const body=`<p class="muted" style="margin-top:0;font-size:13px">ก๊อปข้อความนี้ไปวางในแชต AI (เช่น Claude, ChatGPT)</p>
    <textarea class="promptbox" id="prompt-text" readonly>${esc(text)}</textarea>`;
  openModal(title, body, [
    {label:"ปิด", cls:"btn", on:closeModal},
    {label:"คัดลอก", cls:"btn primary", on:function(){ const ta=$("#prompt-text"); ta.select();
        const done=()=>{ this.textContent="คัดลอกแล้ว ✓"; setTimeout(()=>{ this.textContent="คัดลอก"; },1500); };
        const fail=()=>{ try{ if(document.execCommand("copy")){ done(); return; } }catch(e){}
          this.textContent="เลือกแล้ว — กด Ctrl/Cmd+C"; };   // file:// อาจไม่มีสิทธิ์ clipboard → เลือกข้อความให้ก๊อปเอง
        if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(ta.value).then(done).catch(fail); }
        else fail(); }},
  ]);
}

function copyTA(ta, btn){
  ta.select();
  const label=btn.textContent;
  const done=()=>{ btn.textContent="คัดลอกแล้ว ✓"; setTimeout(()=>{ btn.textContent=label; },1500); };
  const fail=()=>{ try{ if(document.execCommand("copy")){ done(); return; } }catch(e){} btn.textContent="เลือกแล้ว — กด Ctrl/Cmd+C"; };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(ta.value).then(done).catch(fail); }
  else fail();
}

function renderPricePreview(){

  }
}

    : `<span class="muted">ยังไม่มีสรุป — กดปุ่ม “🏷️ จัดประเภท / ตรวจข้อมูล” แล้วให้ AI สรุปธุรกิจมาให้ (ดูว่าหุ้นตัวนี้หาเงินยังไง)</span>`;
  const body = `
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${chips}</div>
    <div style="font-size:14px;line-height:1.65">${summaryHtml}</div>
    <label class="row-check" style="margin-top:16px;display:flex;gap:9px;align-items:flex-start;cursor:pointer">
      <input type="checkbox" id="sum-understood" ${h.understood?"checked":""}/>
      <span>ฉันเข้าใจว่าธุรกิจนี้หาเงินยังไง <small class="muted">— ด่านนี้เป็นการตัดสินของเจ้าของพอร์ต (AI ไม่ให้คะแนนแทน)</small></span>
    </label>
    <p class="disc" style="margin-top:14px">${esc(DISCLAIMER_TH)}</p>`;
  openModal((h.name||"สรุปหุ้น")+(h.ticker?" ("+h.ticker+")":""), body, [{label:"ปิด",cls:"btn",on:closeModal}]);
  const cb=document.getElementById("sum-understood");
  if(cb) cb.onchange=()=>{                          // owner's competence gate — persists, re-renders tab behind modal
    if(!cb.isConnected) return;                     // guard: modal lives in #modal-body (outside #view), survives commit()'s re-render today; protects if ever moved inside #view
    const ns=structuredCloneSafe(STATE);
    const t=findById(ns.investing.holdings, id); if(t) t.understood=cb.checked;
    commit(ns);
  };
}

function wireGlobalEvents(){
  $("#tabs").addEventListener("click",e=>{ const b=e.target.closest(".tab"); if(b) render(b.dataset.tab); });
  document.body.addEventListener("click",e=>{ const b=e.target.closest("[data-help]"); if(b) openHelpModal(b.dataset.help); });   // jargon "?" badges (delegated → works on re-rendered content)
  $("#modal-x").onclick=closeModal;
  $("#overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeModal(); });
  $("#btn-export").onclick=exportState;
  $("#btn-import").onclick=()=>$("#file-import").click();
  $("#file-import").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ if(!confirm("การนำเข้าจะแทนที่ข้อมูลทั้งหมดในเครื่องนี้ ดำเนินการต่อ?")) return;
        importStateFromText(rd.result); alert("นำเข้าข้อมูลสำเร็จ ✓"); }
      catch(err){ alert("นำเข้าไม่สำเร็จ:\n"+err.message); } finally{ e.target.value=""; } };
    rd.readAsText(f);
  });
}

  // clamp
  ok("clampPct(150)=100", clampPct(150)===100);
  ok("clampPct(-5)=0", clampPct(-5)===0);
  ok("clampPct(NaN)=0", clampPct(NaN)===0);
  // capital / nest egg
  close("requiredCapital(100000,4)=30M", requiredCapital(100000,4), 30000000, 1);
  ok("requiredCapital(0,4)=null", requiredCapital(0,4)===null);
  ok("requiredCapital(100000,0)=null", requiredCapital(100000,0)===null);
  close("nestEggFourPercent(100000)=30M", nestEggFourPercent(100000), 30000000, 1);

  const pt = portfolioTotals([{value_thb:1000000,yield_pct:4,cost_basis_thb:800000}], 10);
  close("portfolio grossAnnual=40000", pt.grossAnnualDividend, 40000, 1);

  close("portfolio netMonthly=3000", pt.netMonthlyDividend, 3000, 1);
  close("portfolio blendedYield=4", pt.blendedYieldPct, 4, 1e-3);
  close("portfolio netBlended=3.6", pt.netBlendedYieldPct, 3.6, 1e-3);
  close("yieldOnCost=5", pt.yieldOnCostPct, 5, 1e-3);

  ok("empty portfolio netMonthly=0", pt0.netMonthlyDividend===0);
  // required return — contribution aware (philosophy example ~5.3%)
  const rr = requiredReturn(15000000, 1000000, 30000, 240);
  close("requiredReturn(15M,1M,30k,240m) ~5.2%", rr*100, 5.2, 0.8);
  ok("requiredReturn already-reached = 0", requiredReturn(1000000, 1000000, 0, 120)===0);
  ok("requiredReturn target<=0 = null", requiredReturn(0,1000,0,120)===null);
  ok("requiredReturn unreachable = Infinity", requiredReturn(1e15, 0, 1, 12)===Infinity);
  // contributions REDUCE required return vs no-contribution
  const rrNoC = requiredReturn(15000000, 1000000, 0, 240);
  ok("contributions lower required return", rr < rrNoC);
  // projection edge cases
  const projFlat = projectToTarget({currentValue:100000,netBlendedYieldPct:0,expectedGrowthPct:0,monthlyContribution:0,targetCapital:1000000,startYear:2026,targetYear:2040});
  ok("flat+0 contribution unreachable", projFlat.reachable===false);
  const projNeg = projectToTarget({currentValue:100000,netBlendedYieldPct:0,expectedGrowthPct:-2,monthlyContribution:50000,targetCapital:1000000,startYear:2026,targetYear:2040});
  ok("neg growth + contribution reachable", projNeg.reachable===true);
  ok("projection target<=0 empty", projectToTarget({targetCapital:0,startYear:2026}).series.length===0);
  const projHit = projectToTarget({currentValue:100,netBlendedYieldPct:0,expectedGrowthPct:0,monthlyContribution:100,targetCapital:1000,startYear:2026,targetYear:2027});
  close("projectToTarget monthsToHit=9", projHit.monthsToHit, 9, 0);   // 100 + 100*9 = 1000
  ok("projectToTarget hit reachable", projHit.reachable===true && projHit.hitYear===2027);

  close("enrich apply leaves value_thb", enAp.state.investing.holdings[0].value_thb, 50, 1e-6);
  ok("enrich apply no source mutation", enSt.investing.holdings[0].stock_type==="none");
  ok("enrich prompt has id + framework", buildEnrichPrompt([{id:"hQ",name:"Q",ticker:null,market:"TH",asset_class:"stock",stock_type:"none"}]).indexOf("hQ")>=0 && buildEnrichPrompt([{id:"hQ",name:"Q",market:"TH",asset_class:"stock",stock_type:"none"}]).indexOf("quality_score")>=0);

  // ---- v4: stock summary + competence gate ----
  ok("enrich parse captures summary", parseEnrichResponse('[{"id":"h1","summary":"ขายของออนไลน์\\nหาเงินจากค่าคอม"}]').items[0].summary.indexOf("ขายของ")>=0);
  ok("enrich apply writes ai_summary", applyEnrich({investing:{holdings:[{id:"h1",name:"A",ai_summary:null}]}}, [{id:"h1",summary:"สรุปใหม่"}]).state.investing.holdings[0].ai_summary==="สรุปใหม่");
  const sumPv = previewEnrich([{id:"h1",name:"A",ai_summary:null,asset_class:"stock",stock_type:"none",yield_pct:0,quality_score:null,valuation_verdict:"unknown",ticker:"X"}],[{id:"h1",summary:"xx"}]);
  ok("enrich preview flags summary change", sumPv.rows.length===1 && sumPv.rows[0].changes.some(c=>c.field==="สรุป"));
  ok("enrich prompt asks summary + splits competence", buildEnrichPrompt([{id:"h1",name:"A",market:"TH",asset_class:"stock",stock_type:"none"}]).indexOf("summary")>=0 && buildEnrichPrompt([{id:"h1",name:"A",market:"TH",asset_class:"stock",stock_type:"none"}]).indexOf("circle of competence")>=0);
  // v3→v4 migration: ai_summary/understood defaults, value preserved
  const v3h={schemaVersion:3, meta:{onboarded:true}, goal:defaultState().goal, settings:defaultState().settings, investing:{holdings:[{id:"u",name:"Z",asset_class:"stock",stock_type:"none",units:10,price_per_unit:5,fx_rate:1,currency:"THB",yield_pct:2}]}, real_estate:{properties:[]}, insurance:{policies:[]}};
  const m4=validateState(migrateState(JSON.parse(JSON.stringify(v3h))));
  ok("v3→v4 migrates ok (schemaVersion=4)", m4.ok===true && m4.value.schemaVersion===4);
  ok("v4 ai_summary default null", m4.value.investing.holdings[0].ai_summary===null);
  ok("v4 understood default false", m4.value.investing.holdings[0].understood===false);
  close("v3→v4 value preserved 10×5×1=50", m4.value.investing.holdings[0].value_thb, 50, 1e-6);

  // ---- jargon help ----
  ok("help badge has data-help", helpBadge("nest_egg").indexOf('data-help="nest_egg"')>=0);
  ok("HELP covers core terms", ["required_return","nest_egg","net_yield","yoc","buckets","quality_score"].every(k=>HELP[k]&&HELP[k].t&&HELP[k].b));

  return R;
}
function renderSelfTests(){
  document.querySelector("header.topbar").style.display="none";
  const R=runSelfTests();
  const pass=R.filter(r=>r.pass).length, fail=R.length-pass;
  const v=$("#view");
  v.innerHTML = `<div id="selftest-view"><div class="card">
    <h2 style="margin-bottom:10px">Self-tests — <span class="${fail?'test-fail':'test-pass'}">${pass}/${R.length} ผ่าน${fail?(' · '+fail+' FAIL'):''}</span></h2>
    <table class="tbl"><thead><tr><th>#</th><th>เทสต์</th><th>ผล</th><th class="num">got</th><th class="num">want</th></tr></thead><tbody>
    ${R.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.name)}</td>
      <td class="${r.pass?'test-pass':'test-fail'}">${r.pass?'PASS':'FAIL'}</td>
      <td class="num">${r.got!=null?fmtNum(r.got,4):''}</td><td class="num">${r.want!=null?fmtNum(r.want,4):''}</td></tr>`).join("")}
    </tbody></table>
    <div style="margin-top:14px"><a href="?">← กลับสู่แอป</a></div>
  </div></div>`;
}

/* ===================================================== BOOT */
function boot(){
  if(location.search.indexOf("selftest")>=0){ renderSelfTests(); return; }
  const {state, fresh, corrupt} = loadState();
  if(corrupt){
    STATE = defaultState();   // don't wipe silently — show recovery banner over a default
    renderTabs();
    $("#view").innerHTML = `<div class="banner bad"><span class="bi">⚠️</span><div>
      <b>ข้อมูลที่บันทึกไว้เสียหาย</b> อ่านไม่ได้ — เลือกได้: เริ่มใหม่ด้วยค่าเริ่มต้น หรือ นำเข้าไฟล์สำรอง<br>
      <button class="btn sm" id="rec-default" style="margin-top:8px">เริ่มใหม่</button>
      <button class="btn sm" id="rec-import" style="margin-top:8px">นำเข้าไฟล์</button></div></div>`;
    $("#rec-default").onclick=()=>{ STATE.meta.onboarded=true; commit(STATE); };
    $("#rec-import").onclick=()=>$("#file-import").click();
    wireGlobalEvents();
    return;
  }
  STATE = state;
  if(fresh) persist();
  wireGlobalEvents();
  render("dashboard");
}
boot();
</script>
